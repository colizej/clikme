{% load i18n %}
<div id="cookie-banner"
     class="fixed bottom-4 left-4 right-4 sm:left-auto sm:right-4 sm:max-w-sm z-50 bg-white border border-(--color-border) shadow-2xl rounded-2xl px-5 py-4"
     style="display:none">
  <p class="text-sm text-(--color-text) mb-3 leading-relaxed">
    🍪 {% trans "Мы используем куки для улучшения работы сайта." %}
    <a href="/privacy/" class="text-(--color-accent) hover:underline ml-1">{% trans "Подробнее" %}</a>
  </p>
  <div class="flex gap-2">
    <button id="cookie-accept" class="ck-btn-accent flex-1 py-2 text-xs">
      {% trans "Принять" %}
    </button>
    <button id="cookie-decline" class="flex-1 py-2 text-xs rounded-full border border-(--color-border) text-(--color-text-muted) hover:bg-(--color-bg-warm) transition-colors">
      {% trans "Отклонить" %}
    </button>
  </div>
</div>
<script>
  (function () {
    var banner  = document.getElementById('cookie-banner');
    var accept  = document.getElementById('cookie-accept');
    var decline = document.getElementById('cookie-decline');

    function getCookie(name) {
      var m = document.cookie.match('(^|;)\\s*' + name + '\\s*=\\s*([^;]+)');
      return m ? m.pop() : '';
    }
    function setCookie(name, value, days) {
      var expires = new Date(Date.now() + days * 864e5).toUTCString();
      document.cookie = name + '=' + value + '; expires=' + expires + '; path=/; SameSite=Lax';
    }

    if (!getCookie('ck_consent')) banner.style.display = '';

    function loadAnalytics() {
      // Google Analytics
      var ga = document.createElement('script');
      ga.async = true;
      ga.src = 'https://www.googletagmanager.com/gtag/js?id=G-W8L33459QV';
      document.head.appendChild(ga);
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-W8L33459QV');
      // Yandex Metrika
      (function(m,e,t,r,i,k,a){
        m[i]=m[i]||function(){(m[i].a=m[i].a||[]).push(arguments)};
        m[i].l=1*new Date();
        for(var j=0;j<document.scripts.length;j++){if(document.scripts[j].src===r){return;}}
        k=e.createElement(t),a=e.getElementsByTagName(t)[0],k.async=1,k.src=r,a.parentNode.insertBefore(k,a)
      })(window,document,'script','https://mc.yandex.ru/metrika/tag.js?id=108310412','ym');
      ym(108310412,'init',{ssr:true,webvisor:true,clickmap:true,ecommerce:"dataLayer",accurateTrackBounce:true,trackLinks:true});
    }

    accept.addEventListener('click', function () {
      setCookie('ck_consent', '1', 365);
      banner.style.display = 'none';
      loadAnalytics();
    });
    decline.addEventListener('click', function () {
      setCookie('ck_consent', '0', 365);
      banner.style.display = 'none';
    });
  })();
</script>
