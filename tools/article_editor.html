<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClikMe · Редактор статьи</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent:        #e07b2d;
      --accent-light:  #fef3e8;
      --accent-medium: #fde0bb;
      --bg:            #fafaf8;
      --bg-panel:      #ffffff;
      --bg-toolbar:    #f4f4f0;
      --bg-editor:     #1e1e2e;
      --text:          #1a1a1a;
      --text-muted:    #6b7280;
      --border:        #e5e7eb;
      --border-dark:   #d1d5db;
      --green:         #4ade80;
      --yellow:        #fbbf24;
      --red:           #ef4444;
      --mono: 'Cascadia Code', 'JetBrains Mono', 'Fira Code', 'Consolas', 'SF Mono', monospace;
      --ui:   -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --r:    8px;
    }

    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: var(--ui);
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }

    /* ─── Header ─────────────────────────────────────────────────────────── */
    .app-header {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 14px;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      box-shadow: 0 1px 4px rgba(0,0,0,.07);
      z-index: 20;
    }
    .logo {
      font-weight: 800; font-size: 15px; color: var(--accent);
      letter-spacing: -.4px; white-space: nowrap; user-select: none;
    }
    .logo small { color: var(--text-muted); font-weight: 400; font-size: 12px; }
    .title-input {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 6px 12px;
      font: 600 14px/1 var(--ui);
      color: var(--text); background: var(--bg);
      outline: none; transition: border-color .15s;
    }
    .title-input:focus { border-color: var(--accent); }
    .title-input::placeholder { font-weight: 400; color: var(--text-muted); }

    .save-badge {
      display: flex; align-items: center; gap: 5px;
      font-size: 11px; color: var(--text-muted); white-space: nowrap;
    }
    .save-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); transition: background .3s; }

    .btn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 6px 12px; border-radius: var(--r); cursor: pointer;
      font: 500 12px/1 var(--ui); border: 1px solid transparent;
      white-space: nowrap; transition: all .13s; text-decoration: none;
    }
    .btn svg { width: 13px; height: 13px; }
    .btn-ghost  { background: transparent; color: var(--text-muted); border-color: var(--border-dark); }
    .btn-ghost:hover { background: var(--bg-toolbar); color: var(--text); }
    .btn-accent { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn-accent:hover { filter: brightness(1.08); }
    .btn-green  { background: #16a34a; color: #fff; border-color: #16a34a; }
    .btn-green:hover { filter: brightness(1.1); }

    /* ─── Meta Panel ──────────────────────────────────────────────────────── */
    .meta-panel {
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0; overflow: hidden;
      max-height: 0; transition: max-height .28s ease;
    }
    .meta-panel.open { max-height: 500px; }

    .meta-fields {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 10px; padding: 12px 14px 4px;
    }
    .meta-field { display: flex; flex-direction: column; gap: 4px; }
    .meta-field.span2 { grid-column: span 2; }
    .meta-field label {
      font: 600 10px/1 var(--ui); text-transform: uppercase;
      letter-spacing: .5px; color: var(--text-muted);
    }
    .meta-input {
      padding: 6px 10px; border: 1px solid var(--border);
      border-radius: var(--r); font: 13px var(--ui);
      color: var(--text); background: var(--bg);
      outline: none; transition: border-color .15s; width: 100%;
    }
    .meta-input:focus { border-color: var(--accent); }

    /* Meta description char counter */
    .meta-desc-wrap { position: relative; }
    .meta-desc-wrap .meta-input { padding-right: 52px; }
    .char-count {
      position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
      font-size: 10px; color: var(--text-muted); pointer-events: none;
    }
    .char-count.warn { color: var(--yellow); }
    .char-count.over { color: var(--red); }

    /* Tag pill input */
    .tag-wrap {
      display: flex; flex-wrap: wrap; align-items: center; gap: 4px;
      padding: 4px 8px; border: 1px solid var(--border);
      border-radius: var(--r); background: var(--bg);
      min-height: 34px; cursor: text; transition: border-color .15s;
    }
    .tag-wrap:focus-within { border-color: var(--accent); }
    .tag-pill {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 2px 8px; border-radius: 20px;
      background: var(--accent-light); color: var(--accent);
      font: 500 11px/1.4 var(--ui);
    }
    .tag-pill button {
      background: none; border: none; cursor: pointer;
      padding: 0; color: inherit; opacity: .7; font-size: 13px; line-height: 1;
    }
    .tag-pill button:hover { opacity: 1; }
    .tag-real-input {
      flex: 1; min-width: 80px; border: none; outline: none;
      background: transparent; font: 12px var(--ui);
    }

    /* Checkboxes row */
    .meta-checks {
      display: flex; align-items: center; gap: 16px;
      padding: 10px 14px 12px;
    }
    .check-label {
      display: flex; align-items: center; gap: 6px;
      font: 500 12px var(--ui); color: var(--text-muted); cursor: pointer;
    }
    .check-label input[type=checkbox] { width: 14px; height: 14px; accent-color: var(--accent); }

    /* ─── Toolbar ─────────────────────────────────────────────────────────── */
    .toolbar {
      display: flex; align-items: center; flex-wrap: wrap; gap: 1px;
      padding: 5px 10px;
      background: var(--bg-toolbar);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .tb-sep { width: 1px; height: 22px; background: var(--border-dark); margin: 0 5px; }
    .tb-btn {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 28px; height: 28px; padding: 0 6px;
      border: none; background: transparent; border-radius: 6px;
      font: 600 12px/1 var(--ui); color: var(--text);
      cursor: pointer; transition: background .1s, color .1s;
      position: relative;
    }
    .tb-btn:hover { background: var(--border); color: var(--accent); }
    .tb-btn svg { width: 14px; height: 14px; stroke-width: 2; }

    /* Tooltip */
    .tb-btn[data-tip]:hover::after {
      content: attr(data-tip);
      position: absolute; top: calc(100% + 5px); left: 50%;
      transform: translateX(-50%);
      background: #111; color: #fff;
      padding: 3px 7px; border-radius: 5px;
      font: 400 11px var(--ui); white-space: nowrap;
      pointer-events: none; z-index: 100;
    }

    .view-toggle { margin-left: auto; display: flex; gap: 2px; }
    .view-btn {
      padding: 3px 10px; border-radius: 6px; cursor: pointer;
      font: 600 11px var(--ui); color: var(--text-muted);
      border: 1px solid var(--border); background: transparent;
      transition: all .12s;
    }
    .view-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* ─── Main area ───────────────────────────────────────────────────────── */
    .main-area { flex: 1; display: flex; overflow: hidden; }
    .pane-hidden { display: none !important; }

    /* Editor pane */
    .pane-editor {
      flex: 1; display: flex; flex-direction: column;
      border-right: 1px solid var(--border); min-width: 0;
    }
    #editor {
      flex: 1; border: none; outline: none; resize: none;
      padding: 20px 24px;
      font: 14px/1.8 var(--mono);
      background: var(--bg-editor);
      color: #cdd6f4;
      tab-size: 2; caret-color: var(--accent);
    }
    #editor::selection { background: rgba(224,123,45,.3); }
    #editor::placeholder { color: #45475a; }

    /* Preview pane */
    .pane-preview {
      flex: 1; overflow-y: auto; background: var(--bg-panel); min-width: 0;
    }
    .preview-inner { max-width: 740px; margin: 0 auto; padding: 24px 28px; }

    /* ─── Prose styles (preview) ──────────────────────────────────────────── */
    .prose {
      font: 15px/1.8 Georgia, 'Times New Roman', serif;
      color: var(--text);
    }
    .prose h1 { font: 900 2em/1.2 var(--ui); margin: 1.4em 0 .5em; }
    .prose h2 { font: 700 1.45em/1.3 var(--ui); margin: 1.3em 0 .4em; }
    .prose h3 { font: 700 1.15em/1.3 var(--ui); margin: 1.2em 0 .4em; }
    .prose h4 { font: 700 1em/1.3 var(--ui); margin: 1.1em 0 .3em; }
    .prose h1, .prose h2 { border-bottom: 2px solid var(--border); padding-bottom: .3em; }
    .prose p  { margin: 0 0 1em; }
    .prose a  { color: var(--accent); text-decoration: underline; }
    .prose a:hover { color: #b85f1f; }
    .prose strong { font-weight: 700; }
    .prose em { font-style: italic; }
    .prose del { text-decoration: line-through; color: var(--text-muted); }
    .prose ul, .prose ol { padding-left: 1.6em; margin: .5em 0 1em; }
    .prose ul { list-style: disc; }
    .prose ol { list-style: decimal; }
    .prose li { margin: .3em 0; }
    .prose li input[type=checkbox] { margin-right: 6px; accent-color: var(--accent); }
    .prose blockquote {
      border-left: 4px solid var(--accent);
      margin: 1.2em 0;
      padding: .7em 1.1em;
      background: var(--accent-light);
      border-radius: 0 var(--r) var(--r) 0;
      color: #5a4a3a;
      font-style: italic;
    }
    .prose blockquote p { margin: 0; }
    .prose code {
      font: .865em/1 var(--mono);
      background: #f3f4f6; color: #d63369;
      padding: .15em .4em; border-radius: 4px;
    }
    .prose pre {
      background: var(--bg-editor); color: #cdd6f4;
      border-radius: var(--r); padding: 1.1em 1.3em;
      overflow-x: auto; margin: 1em 0;
    }
    .prose pre code {
      background: transparent; color: inherit;
      padding: 0; font-size: .875em;
    }
    .prose hr {
      border: none; border-top: 2px solid var(--border); margin: 2em 0;
    }
    .prose img { max-width: 100%; border-radius: var(--r); margin: 1em 0; display: block; }
    .prose table { border-collapse: collapse; width: 100%; margin: 1em 0; font-size: .9em; font-family: var(--ui); }
    .prose th { background: var(--bg-toolbar); font-weight: 600; padding: .5em .8em; border: 1px solid var(--border); text-align: left; }
    .prose td { padding: .5em .8em; border: 1px solid var(--border); }
    .prose tr:nth-child(even) td { background: var(--bg); }

    /* ─── Status bar ──────────────────────────────────────────────────────── */
    .status-bar {
      display: flex; align-items: center; gap: 14px;
      padding: 4px 14px;
      background: var(--bg-toolbar);
      border-top: 1px solid var(--border);
      font: 11px var(--ui); color: var(--text-muted);
      flex-shrink: 0;
    }
    .status-bar .spacer { flex: 1; }

    /* ─── Scrollbars ──────────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-dark); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    /* ─── Copy success ────────────────────────────────────────────────────── */
    .copy-ok { color: var(--green) !important; }
  </style>
</head>
<body>

<!-- ══════════════════════════════════════════════════════════ HEADER -->
<header class="app-header">
  <div class="logo">ClikMe <small>/ Редактор статьи</small></div>

  <input type="text" id="article-title" class="title-input"
         placeholder="Заголовок статьи..."
         oninput="onTitleChange()" autocomplete="off">

  <div class="save-badge">
    <span class="save-dot" id="save-dot"></span>
    <span id="save-status">Не сохранено</span>
  </div>

  <button class="btn btn-ghost" onclick="toggleMeta()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
    Метаданные
  </button>

  <button class="btn btn-ghost" id="copy-btn" onclick="copyMarkdown()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
    Копировать
  </button>

  <button class="btn btn-accent" onclick="downloadMd()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
    Скачать .md
  </button>
</header>

<!-- ══════════════════════════════════════════════════════ META PANEL -->
<div class="meta-panel" id="meta-panel">
  <div class="meta-fields">

    <div class="meta-field">
      <label>Slug (URL)</label>
      <input type="text" id="meta-slug" class="meta-input" placeholder="auto-slug-iz-zagolovka" autocomplete="off">
    </div>

    <div class="meta-field">
      <label>Подзаголовок</label>
      <input type="text" id="meta-subtitle" class="meta-input" placeholder="Краткий подзаголовок...">
    </div>

    <div class="meta-field span2">
      <label>Краткое описание <small style="opacity:.6;font-weight:400">(для карточки)</small></label>
      <input type="text" id="meta-short-desc" class="meta-input" placeholder="1–2 предложения для карточки статьи и мета...">
    </div>

    <div class="meta-field">
      <label>Категория</label>
      <input type="text" id="meta-category" class="meta-input" value="blog" autocomplete="off">
    </div>

    <div class="meta-field">
      <label>Теги <small style="opacity:.6;font-weight:400">(Enter — добавить)</small></label>
      <div class="tag-wrap" id="tag-wrap" onclick="document.getElementById('tag-input').focus()">
        <input type="text" id="tag-input" class="tag-real-input"
               placeholder="обзор, гид..." onkeydown="tagKeydown(event)">
      </div>
    </div>

    <div class="meta-field span2">
      <label>Meta Title</label>
      <input type="text" id="meta-title-field" class="meta-input" placeholder="SEO заголовок (авто из заголовка)">
    </div>

    <div class="meta-field span2 meta-desc-wrap">
      <label>Meta Description <small style="opacity:.6;font-weight:400">(до 160 симв.)</small></label>
      <input type="text" id="meta-desc-field" class="meta-input"
             placeholder="Описание для поисковика..." oninput="updateMetaCount()">
      <span class="char-count" id="meta-count">0/160</span>
    </div>

    <div class="meta-field span2">
      <label>Meta Keywords</label>
      <input type="text" id="meta-keywords" class="meta-input" placeholder="ключ1, ключ2, ключ3...">
    </div>

  </div>
  <div class="meta-checks">
    <label class="check-label"><input type="checkbox" id="check-published" checked> Опубликована</label>
    <label class="check-label"><input type="checkbox" id="check-featured"> Избранная</label>
    <label class="check-label"><input type="checkbox" id="check-noindex"> NoIndex</label>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════════ TOOLBAR -->
<div class="toolbar">

  <!-- Headings -->
  <button class="tb-btn" onclick="insertHeading(1)" data-tip="Заголовок H1 (Alt+1)">H1</button>
  <button class="tb-btn" onclick="insertHeading(2)" data-tip="Заголовок H2 (Alt+2)">H2</button>
  <button class="tb-btn" onclick="insertHeading(3)" data-tip="Заголовок H3 (Alt+3)">H3</button>
  <button class="tb-btn" onclick="insertHeading(4)" data-tip="Заголовок H4 (Alt+4)">H4</button>

  <div class="tb-sep"></div>

  <!-- Inline -->
  <button class="tb-btn" onclick="wrapSel('**','**','жирный')" data-tip="Жирный (Ctrl+B)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M6 4h8a4 4 0 010 8H6zM6 12h9a4 4 0 010 8H6z"/></svg>
  </button>
  <button class="tb-btn" onclick="wrapSel('*','*','курсив')" data-tip="Курсив (Ctrl+I)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="19" y1="4" x2="10" y2="4"/><line x1="14" y1="20" x2="5" y2="20"/><line x1="15" y1="4" x2="9" y2="20"/></svg>
  </button>
  <button class="tb-btn" onclick="wrapSel('~~','~~','зачёркнутый')" data-tip="Зачёркнутый">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="5" y1="12" x2="19" y2="12" stroke-width="2.5"/><path d="M16 6c0-1.1-1.8-2-4-2s-4 .9-4 2 1 1.8 4 2M8 18c0 1.1 1.8 2 4 2s4-.9 4-2-1-1.8-4-2"/></svg>
  </button>

  <div class="tb-sep"></div>

  <!-- Lists -->
  <button class="tb-btn" onclick="prefixLines('- ')" data-tip="Маркированный список">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="9" y1="6" x2="20" y2="6"/><line x1="9" y1="12" x2="20" y2="12"/><line x1="9" y1="18" x2="20" y2="18"/><circle cx="4" cy="6" r="1.2" fill="currentColor" stroke="none"/><circle cx="4" cy="12" r="1.2" fill="currentColor" stroke="none"/><circle cx="4" cy="18" r="1.2" fill="currentColor" stroke="none"/></svg>
  </button>
  <button class="tb-btn" onclick="insertOrderedList()" data-tip="Нумерованный список">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="10" y1="6" x2="21" y2="6"/><line x1="10" y1="12" x2="21" y2="12"/><line x1="10" y1="18" x2="21" y2="18"/><text x="1" y="8" font-size="7" fill="currentColor" stroke="none" font-family="monospace">1.</text><text x="1" y="14" font-size="7" fill="currentColor" stroke="none" font-family="monospace">2.</text><text x="1" y="20" font-size="7" fill="currentColor" stroke="none" font-family="monospace">3.</text></svg>
  </button>
  <button class="tb-btn" onclick="prefixLines('- [ ] ')" data-tip="Чеклист / задача">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
  </button>

  <div class="tb-sep"></div>

  <!-- Block -->
  <button class="tb-btn" onclick="prefixLines('> ')" data-tip="Цитата (Ctrl+Shift+Q)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 2v5c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z"/><path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 2v5c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4v3c0 1 0 1 1 1z"/></svg>
  </button>
  <button class="tb-btn" onclick="wrapSel('`','`','код')" data-tip="Инлайн код (Ctrl+E)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
  </button>
  <button class="tb-btn" onclick="insertCodeBlock()" data-tip="Блок кода (Ctrl+Shift+E)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
  </button>

  <div class="tb-sep"></div>

  <!-- Insert -->
  <button class="tb-btn" onclick="insertLink()" data-tip="Ссылка (Ctrl+K)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>
  </button>
  <button class="tb-btn" onclick="insertImage()" data-tip="Изображение">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
  </button>
  <button class="tb-btn" onclick="insertTable()" data-tip="Таблица">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg>
  </button>
  <button class="tb-btn" onclick="insertAtPos('\n\n---\n\n')" data-tip="Горизонтальная линия">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="3" y1="12" x2="21" y2="12" stroke-width="2.5"/></svg>
  </button>

  <div class="tb-sep"></div>

  <!-- Clear -->
  <button class="tb-btn" onclick="clearEditor()" data-tip="Очистить редактор" style="color:var(--red)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
  </button>

  <!-- View toggle -->
  <div class="view-toggle">
    <button class="view-btn active" id="btn-split"   onclick="setView('split')">Редактор + превью</button>
    <button class="view-btn"        id="btn-edit"    onclick="setView('edit')">Только редактор</button>
    <button class="view-btn"        id="btn-preview" onclick="setView('preview')">Только превью</button>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════════== MAIN -->
<div class="main-area">

  <div class="pane-editor" id="pane-editor">
    <textarea id="editor"
      spellcheck="false"
      placeholder="# Заголовок статьи

Начните писать здесь или используйте кнопки на панели инструментов.

## Raздел

Текст с **жирным**, *курсивом* и [ссылкой](https://example.com).

> Блок цитаты — выделите текст или нажмите кнопку на панели.

- Пункт списка 1
- Пункт списка 2
- Пункт списка 3"
      oninput="onEditorInput()"
      onkeydown="editorKeydown(event)"></textarea>
  </div>

  <div class="pane-preview" id="pane-preview">
    <div class="preview-inner">
      <div class="prose" id="preview">
        <p style="color:#9ca3af;font-style:italic;text-align:center;padding:60px 0 40px">
          Начните писать — здесь появится превью...
        </p>
      </div>
    </div>
  </div>

</div>

<!-- ══════════════════════════════════════════════════════ STATUS BAR -->
<div class="status-bar">
  <span id="stat-words">0 слов</span>
  <span>·</span>
  <span id="stat-chars">0 символов</span>
  <span>·</span>
  <span id="stat-lines">0 строк</span>
  <span class="spacer"></span>
  <span id="save-status2">—</span>
</div>

<!-- ═══════════════════════════════════════════════════════ CDN LIBS -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/highlight.min.js"></script>

<script>
'use strict';

// ── Marked setup ──────────────────────────────────────────────────────────────
marked.setOptions({ breaks: true, gfm: true });

// ── Tags ──────────────────────────────────────────────────────────────────────
let tags = [];

function tagKeydown(e) {
  const inp = document.getElementById('tag-input');
  if (e.key === 'Enter' || e.key === ',') {
    e.preventDefault();
    const val = inp.value.trim().replace(/,$/, '');
    if (val) { addTag(val); }
    inp.value = '';
  } else if (e.key === 'Backspace' && !inp.value && tags.length) {
    removeTag(tags.length - 1);
  }
}

function addTag(name) {
  name = name.trim().toLowerCase();
  if (!name || tags.includes(name)) return;
  tags.push(name);
  renderTags();
  scheduleAutosave();
}

function removeTag(i) {
  tags.splice(i, 1);
  renderTags();
  scheduleAutosave();
}

function renderTags() {
  const wrap = document.getElementById('tag-wrap');
  const inp  = document.getElementById('tag-input');
  wrap.querySelectorAll('.tag-pill').forEach(p => p.remove());
  tags.forEach((tag, i) => {
    const pill = document.createElement('span');
    pill.className = 'tag-pill';
    pill.innerHTML = `${tag}<button type="button" onclick="removeTag(${i})" tabindex="-1">×</button>`;
    wrap.insertBefore(pill, inp);
  });
}

// ── Meta panel ────────────────────────────────────────────────────────────────
let metaOpen = false;

function toggleMeta() {
  metaOpen = !metaOpen;
  document.getElementById('meta-panel').classList.toggle('open', metaOpen);
}

// ── Title → slug & meta_title ─────────────────────────────────────────────────
function onTitleChange() {
  const title = document.getElementById('article-title').value;
  const slugEl = document.getElementById('meta-slug');
  const mtEl   = document.getElementById('meta-title-field');
  if (!slugEl.dataset.manual) slugEl.value = generateSlug(title);
  if (!mtEl.dataset.manual)   mtEl.value   = title ? title + ' — ClikMe' : '';
  scheduleAutosave();
}

['meta-slug', 'meta-title-field'].forEach(id => {
  document.getElementById(id).addEventListener('input', function() {
    this.dataset.manual = '1';
    scheduleAutosave();
  });
});

function generateSlug(text) {
  const map = {
    'а':'a','б':'b','в':'v','г':'g','д':'d','е':'e','ё':'yo','ж':'zh','з':'z',
    'и':'i','й':'j','к':'k','л':'l','м':'m','н':'n','о':'o','п':'p','р':'r',
    'с':'s','т':'t','у':'u','ф':'f','х':'h','ц':'ts','ч':'ch','ш':'sh','щ':'sch',
    'ъ':'','ы':'y','ь':'','э':'e','ю':'yu','я':'ya',
    ' ':'-', '.':'-', '_':'-', '/':'-',
  };
  return text.toLowerCase()
    .split('').map(c => map[c] !== undefined ? map[c] : /[a-z0-9-]/.test(c) ? c : '')
    .join('').replace(/-+/g, '-').replace(/^-|-$/g, '').substring(0, 100);
}

// ── Meta description counter ──────────────────────────────────────────────────
function updateMetaCount() {
  const el  = document.getElementById('meta-desc-field');
  const cnt = document.getElementById('meta-count');
  const len = el.value.length;
  cnt.textContent = `${len}/160`;
  cnt.className   = 'char-count' + (len > 160 ? ' over' : len > 140 ? ' warn' : '');
  scheduleAutosave();
}

// ── Editor helpers ────────────────────────────────────────────────────────────
const ed = () => document.getElementById('editor');

let previewTimer;
function onEditorInput() {
  clearTimeout(previewTimer);
  previewTimer = setTimeout(updatePreview, 150);
  updateStats();
  scheduleAutosave();
}

function updatePreview() {
  const html = marked.parse(ed().value);
  document.getElementById('preview').innerHTML = html;
  document.querySelectorAll('#preview pre code').forEach(b => hljs.highlightElement(b));
}

function updateStats() {
  const txt   = ed().value;
  const words = txt.trim() ? txt.trim().split(/\s+/).length : 0;
  document.getElementById('stat-words').textContent = `${words} слов`;
  document.getElementById('stat-chars').textContent = `${txt.length} символов`;
  document.getElementById('stat-lines').textContent = `${txt.split('\n').length} строк`;
}

// ── Toolbar actions ───────────────────────────────────────────────────────────
function wrapSel(before, after, placeholder) {
  const ta = ed();
  const s = ta.selectionStart, e = ta.selectionEnd;
  const selected = ta.value.substring(s, e);
  const text = selected || placeholder || 'текст';
  ta.setRangeText(before + text + after, s, e, 'end');
  if (!selected) {
    ta.setSelectionRange(s + before.length, s + before.length + text.length);
  }
  ta.focus(); updatePreview(); scheduleAutosave();
}

function prefixLines(prefix) {
  const ta = ed();
  const s = ta.selectionStart, e = ta.selectionEnd;
  const txt = ta.value;
  const lineStart = txt.lastIndexOf('\n', s - 1) + 1;
  let   lineEnd   = txt.indexOf('\n', e); if (lineEnd < 0) lineEnd = txt.length;
  const newLines  = txt.substring(lineStart, lineEnd).split('\n')
    .map(l => prefix + l).join('\n');
  ta.setRangeText(newLines, lineStart, lineEnd, 'end');
  ta.focus(); updatePreview(); scheduleAutosave();
}

function insertHeading(level) {
  const prefix = '#'.repeat(level) + ' ';
  const ta = ed();
  const s  = ta.selectionStart;
  const txt = ta.value;
  const lineStart = txt.lastIndexOf('\n', s - 1) + 1;
  let   lineEnd   = txt.indexOf('\n', s); if (lineEnd < 0) lineEnd = txt.length;
  const line = txt.substring(lineStart, lineEnd);
  const stripped = line.replace(/^#{1,6}\s/, '');
  const hadSame  = line.match(/^(#{1,6})\s/) && line.match(/^#{1,6}\s/)[0].trimEnd() === '#'.repeat(level);
  const newLine  = hadSame ? stripped : prefix + stripped;
  ta.setRangeText(newLine, lineStart, lineEnd, 'end');
  ta.focus(); updatePreview(); scheduleAutosave();
}

function insertOrderedList() {
  const ta = ed();
  const s = ta.selectionStart, e = ta.selectionEnd;
  const txt = ta.value;
  const lineStart = txt.lastIndexOf('\n', s - 1) + 1;
  let   lineEnd   = txt.indexOf('\n', e); if (lineEnd < 0) lineEnd = txt.length;
  const newLines  = txt.substring(lineStart, lineEnd).split('\n')
    .map((l, i) => `${i + 1}. ${l}`).join('\n');
  ta.setRangeText(newLines, lineStart, lineEnd, 'end');
  ta.focus(); updatePreview(); scheduleAutosave();
}

function insertCodeBlock() {
  const ta   = ed();
  const s    = ta.selectionStart, e = ta.selectionEnd;
  const sel  = ta.value.substring(s, e);
  const lang = prompt('Язык (python, js, html, bash…):', '') || '';
  const need_nl = s > 0 && ta.value[s - 1] !== '\n';
  const block = (need_nl ? '\n' : '') + '```' + lang + '\n' + (sel || 'код здесь') + '\n```\n';
  ta.setRangeText(block, s, e, 'end');
  ta.focus(); updatePreview(); scheduleAutosave();
}

function insertLink() {
  const ta  = ed();
  const s   = ta.selectionStart, e = ta.selectionEnd;
  const sel = ta.value.substring(s, e);
  const url = prompt('URL:', 'https://');
  if (!url) return;
  const text = sel || 'текст ссылки';
  ta.setRangeText(`[${text}](${url})`, s, e, 'end');
  ta.focus(); updatePreview(); scheduleAutosave();
}

function insertImage() {
  const url = prompt('URL изображения:', 'https://');
  if (!url) return;
  const alt = prompt('Alt текст:', '') || '';
  insertAtPos(`\n![${alt}](${url})\n`);
}

function insertTable() {
  const rows = parseInt(prompt('Строк данных:', '3'), 10) || 3;
  const cols = parseInt(prompt('Столбцов:', '3'), 10)    || 3;
  const header = Array.from({length: cols}, (_, i) => ` Столбец ${i+1} `).join('|');
  const sep    = Array.from({length: cols}, () => ':---').join('|');
  const row    = Array.from({length: cols}, () => ' Данные ').join('|');
  insertAtPos('\n|' + header + '|\n|' + sep + '|\n' +
    Array.from({length: rows}, () => '|' + row + '|').join('\n') + '\n');
}

function insertAtPos(text) {
  const ta = ed();
  const s  = ta.selectionStart;
  ta.setRangeText(text, s, ta.selectionEnd, 'end');
  ta.focus(); updatePreview(); scheduleAutosave();
}

function clearEditor() {
  if (!confirm('Очистить всё содержимое редактора?')) return;
  ed().value = '';
  updatePreview(); updateStats(); scheduleAutosave();
}

// ── Keyboard shortcuts ────────────────────────────────────────────────────────
function editorKeydown(e) {
  const mod = e.ctrlKey || e.metaKey;
  if (mod) {
    switch (e.key.toLowerCase()) {
      case 'b': e.preventDefault(); wrapSel('**', '**', 'жирный текст'); break;
      case 'i': e.preventDefault(); wrapSel('*',  '*',  'курсив');       break;
      case 'k': e.preventDefault(); insertLink(); break;
      case 'e':
        e.preventDefault();
        if (e.shiftKey) insertCodeBlock();
        else wrapSel('`', '`', 'код');
        break;
      case 'q': if (e.shiftKey) { e.preventDefault(); prefixLines('> '); } break;
    }
  }
  if (e.altKey && !mod) {
    const n = parseInt(e.key, 10);
    if (n >= 1 && n <= 4) { e.preventDefault(); insertHeading(n); }
  }
  // Tab → 2 spaces
  if (e.key === 'Tab') {
    e.preventDefault();
    insertAtPos('  ');
  }
}

// ── View modes ────────────────────────────────────────────────────────────────
function setView(mode) {
  ['split', 'edit', 'preview'].forEach(m =>
    document.getElementById('btn-' + m).classList.remove('active')
  );
  document.getElementById('btn-' + mode).classList.add('active');

  const ep = document.getElementById('pane-editor');
  const pp = document.getElementById('pane-preview');
  ep.classList.remove('pane-hidden');
  pp.classList.remove('pane-hidden');
  if (mode === 'edit')    pp.classList.add('pane-hidden');
  if (mode === 'preview') ep.classList.add('pane-hidden');
}

// ── Autosave (localStorage) ───────────────────────────────────────────────────
let saveTimer;

function scheduleAutosave() {
  document.getElementById('save-dot').style.background = 'var(--yellow)';
  clearTimeout(saveTimer);
  saveTimer = setTimeout(doSave, 1500);
}

function doSave() {
  try {
    localStorage.setItem('clikme_draft', JSON.stringify(collectData()));
    const t = new Date().toLocaleTimeString('ru', {hour: '2-digit', minute: '2-digit'});
    document.getElementById('save-status').textContent  = `Сохранено ${t}`;
    document.getElementById('save-status2').textContent = `Автосохр. ${t}`;
    document.getElementById('save-dot').style.background = 'var(--green)';
  } catch(e) {
    document.getElementById('save-status').textContent = 'Ошибка сохранения';
  }
}

// ── Collect / restore data ────────────────────────────────────────────────────
function collectData() {
  return {
    title:             document.getElementById('article-title').value,
    slug:              document.getElementById('meta-slug').value,
    subtitle:          document.getElementById('meta-subtitle').value,
    short_description: document.getElementById('meta-short-desc').value,
    category:          document.getElementById('meta-category').value,
    tags:              [...tags],
    meta_title:        document.getElementById('meta-title-field').value,
    meta_description:  document.getElementById('meta-desc-field').value,
    meta_keywords:     document.getElementById('meta-keywords').value,
    is_published:      document.getElementById('check-published').checked,
    is_featured:       document.getElementById('check-featured').checked,
    noindex:           document.getElementById('check-noindex').checked,
    content:           ed().value,
    slug_manual:       !!document.getElementById('meta-slug').dataset.manual,
    mt_manual:         !!document.getElementById('meta-title-field').dataset.manual,
  };
}

function restoreData(d) {
  document.getElementById('article-title').value   = d.title             || '';
  document.getElementById('meta-slug').value        = d.slug              || '';
  document.getElementById('meta-subtitle').value    = d.subtitle          || '';
  document.getElementById('meta-short-desc').value  = d.short_description || '';
  document.getElementById('meta-category').value    = d.category          || 'blog';
  document.getElementById('meta-title-field').value = d.meta_title        || '';
  document.getElementById('meta-desc-field').value  = d.meta_description  || '';
  document.getElementById('meta-keywords').value    = d.meta_keywords     || '';
  document.getElementById('check-published').checked = d.is_published !== false;
  document.getElementById('check-featured').checked  = !!d.is_featured;
  document.getElementById('check-noindex').checked   = !!d.noindex;
  if (d.slug_manual) document.getElementById('meta-slug').dataset.manual = '1';
  if (d.mt_manual)   document.getElementById('meta-title-field').dataset.manual = '1';
  ed().value = d.content || '';
  tags = d.tags || [];
  renderTags();
  updatePreview(); updateStats(); updateMetaCount();
}

function loadDraft() {
  const raw = localStorage.getItem('clikme_draft');
  if (!raw) return;
  try {
    const d = JSON.parse(raw);
    if (d.content || d.title) {
      if (confirm('Найден сохранённый черновик. Загрузить?')) {
        restoreData(d);
        document.getElementById('save-status').textContent = 'Черновик загружен';
      }
    }
  } catch(e) { /* ignore */ }
}

// ── Generate & download .md ───────────────────────────────────────────────────
function generateMarkdown() {
  const d   = collectData();
  const esc = s => (s || '').replace(/\\/g, '\\\\').replace(/"/g, '\\"');
  const lines = ['---'];
  if (d.title)             lines.push(`title: "${esc(d.title)}"`);
  if (d.slug)              lines.push(`slug: "${d.slug}"`);
  if (d.subtitle)          lines.push(`subtitle: "${esc(d.subtitle)}"`);
  if (d.short_description) lines.push(`short_description: "${esc(d.short_description)}"`);
  if (d.category)          lines.push(`category: "${d.category}"`);
  if (d.tags.length)       lines.push(`tags: [${d.tags.map(t => `"${t}"`).join(', ')}]`);
  if (d.meta_title)        lines.push(`meta_title: "${esc(d.meta_title)}"`);
  if (d.meta_description)  lines.push(`meta_description: "${esc(d.meta_description)}"`);
  if (d.meta_keywords)     lines.push(`meta_keywords: "${esc(d.meta_keywords)}"`);
  lines.push(`is_published: ${d.is_published}`);
  if (d.is_featured) lines.push('is_featured: true');
  if (d.noindex)     lines.push('noindex: true');
  lines.push('---', '', d.content);
  return lines.join('\n');
}

function downloadMd() {
  const d    = collectData();
  const slug = d.slug || generateSlug(d.title) || 'article';
  const blob = new Blob([generateMarkdown()], { type: 'text/markdown;charset=utf-8' });
  const a    = document.createElement('a');
  a.href     = URL.createObjectURL(blob);
  a.download = slug + '.md';
  a.click();
  URL.revokeObjectURL(a.href);
}

function copyMarkdown() {
  navigator.clipboard.writeText(generateMarkdown()).then(() => {
    const btn = document.getElementById('copy-btn');
    const orig = btn.innerHTML;
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" style="width:13px;height:13px"><polyline points="20 6 9 17 4 12"/></svg> Скопировано!`;
    btn.classList.add('copy-ok');
    setTimeout(() => { btn.innerHTML = orig; btn.classList.remove('copy-ok'); }, 2500);
  }).catch(() => {
    // fallback
    const ta = document.createElement('textarea');
    ta.value = generateMarkdown();
    document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
  });
}

// ── Prevent accidental close ──────────────────────────────────────────────────
window.addEventListener('beforeunload', e => {
  if (ed().value.trim()) { e.preventDefault(); e.returnValue = ''; }
});

// ── Init ──────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  updatePreview();
  updateStats();
  loadDraft();
});

// Wire up remaining meta inputs for autosave
['meta-subtitle','meta-short-desc','meta-category','meta-keywords'].forEach(id => {
  const el = document.getElementById(id);
  if (el) el.addEventListener('input', scheduleAutosave);
});
['check-published','check-featured','check-noindex'].forEach(id => {
  document.getElementById(id).addEventListener('change', scheduleAutosave);
});
</script>
</body>
