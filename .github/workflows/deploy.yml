name: Deploy to EU server

on:
  # push:
  #   branches: [main]
  workflow_dispatch:  # только ручной запуск

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /home/clikme/clikme

            # Бэкап БД перед деплоем
            cp db.sqlite3 "db.sqlite3.$(date +%Y%m%d_%H%M)" 2>/dev/null || true

            git pull origin main
            source venv/bin/activate
            pip install -r requirements.txt -q
            python manage.py migrate --run-syncdb
            python manage.py collectstatic --no-input --clear

            # Пересборка Tailwind (если шаблоны менялись)
            if git diff --name-only HEAD~1 HEAD | grep -qE 'templates/|static/css/input.css'; then
              ./tailwindcss -i static/css/input.css -o static/css/style.css --minify
            fi

            sudo systemctl restart clikme
            echo "Deployed: $(git log --oneline -1)"
